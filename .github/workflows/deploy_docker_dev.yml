name: Deploy Development Release to DockerHub

on:
  push:
    branches: [ "main" ]

jobs:
  components:
    name: "Dev Docker (${{ matrix.slug }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: server
            image: nexterm/server
            dockerfile: Dockerfile.server
          - slug: engine
            image: nexterm/engine
            dockerfile: Dockerfile.engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ matrix.image }}:development
          cache-from: type=gha,scope=dev-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=dev-${{ matrix.slug }}

  aio:
    name: "Dev Docker (aio)"
    runs-on: ubuntu-latest
    needs: components

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: nexterm/aio:development
          build-args: |
            SERVER_IMAGE=nexterm/server:development
            ENGINE_IMAGE=nexterm/engine:development
          cache-from: type=gha,scope=dev-aio
          cache-to: type=gha,mode=max,scope=dev-aio