name: Build CLI

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      semver:
        required: true
        type: string
      upload_url:
        required: true
        type: string

jobs:
  build-cli:
    name: "CLI (${{ matrix.name }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: nt-linux-x64
          - name: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: nt-linux-arm64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: nt-macos-arm64
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nt-windows-x64.exe

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Update CLI version
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            sed -i '' "s/^version = \".*\"/version = \"${{ inputs.semver }}\"/" cli/Cargo.toml
          else
            sed -i "s/^version = \".*\"/version = \"${{ inputs.semver }}\"/" cli/Cargo.toml
          fi

      - name: Build CLI
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ inputs.upload_url }}
          asset_path: cli/target/${{ matrix.target }}/release/${{ runner.os == 'Windows' && 'nt.exe' || 'nt' }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: application/octet-stream
